<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contacto – Chía Segura</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/navbar.css" />
  <link rel="stylesheet" href="css/components.css" />
</head>
<body>
  <nav class="navbar" id="navbar">
    <div class="navbar__container">
      <a class="navbar__brand" href="index.html"><div class="navbar__logo-icon">...</div><span>Chía Segura</span></a>
      <ul class="navbar__menu" id="navMenu">
        <li><a class="navbar__link" href="index.html">Inicio</a></li>
        <li><a class="navbar__link" href="mapa.html">Mapa</a></li>
        <li><a class="navbar__link" href="panico.html">Pánico</a></li>
        <li><a class="navbar__link" href="contacto.html">Contacto</a></li>
      </ul>
      <button class="navbar__toggle" id="navToggle" aria-label="Abrir menú"><span></span><span></span><span></span></button>
    </div>
  </nav>

  <main style="padding:120px 24px 60px;">
    <div class="container">
      <h1>Contacto</h1>
      <p>Escríbenos para dudas, colaboración o soporte académico.</p>

      <form id="contactForm" style="max-width:640px;">
        <div class="modal-field">
          <input type="text" class="form-input" id="contactName" placeholder="Nombre" required />
        </div>
        <div class="modal-field">
          <input type="email" class="form-input" id="contactEmail" placeholder="Correo electrónico" required />
        </div>
        <div class="modal-field">
          <textarea class="form-input form-textarea" id="contactMessage" placeholder="Mensaje" required></textarea>
        </div>
        <div style="display:flex;gap:10px;">
          <button class="btn btn--orange" type="submit">Enviar</button>
          <button class="btn" type="reset">Limpiar</button>
        </div>
      </form>
    </div>
  </main>

  <footer class="footer"><div class="footer__container"><div class="footer__brand">Chía Segura</div><div class="footer__center">Facultad de Ingeniería – Universidad de Cundinamarca</div><div class="footer__copy">© 2025 Todos los derechos reservados</div></div></footer>

  <script src="config/emailjs.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/navbar.js"></script>
  <script>
    document.getElementById('contactForm').addEventListener('submit', function(e){
      e.preventDefault();
      window.showToast && window.showToast('Mensaje enviado', 'Gracias por contactarnos', 'success');
      this.reset();
    });
  </script>
</body>
</html>
