<!DOCTYPE html>
<html lang="es">
<head>

  
  <link rel="stylesheet" href="./css/hero.css" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mapa de Calor – Chía Segura</title>
  <meta name="description" content="Visualiza en tiempo real el mapa de calor de incidentes reportados en Chía." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/navbar.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>

<body>
 
  <!-- ═══ NAVBAR ═══ -->
  <nav class="navbar" id="navbar" role="navigation" aria-label="Main navigation">
    <div class="navbar__container">
      <a class="navbar__brand" href="index.html">
        <div class="navbar__logo-icon" aria-hidden="true">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
        </div>
        <span class="navbar__brand-text">Chía Segura</span>
      </a>

      <ul class="navbar__menu" id="navMenu" role="menubar">
        <li role="none"><a class="navbar__link" role="menuitem" href="index.html">Inicio</a></li>
        <li role="none"><a class="navbar__link" role="menuitem" href="mapa.html">Mapa</a></li>
        <li role="none"><a class="navbar__link" role="menuitem" href="boton-panico.html">Pánico</a></li>
        <li role="none"><a class="navbar__link" role="menuitem" href="contacto.html">Contacto</a></li>
      </ul>

      <button class="navbar__toggle" id="navToggle" aria-label="Abrir menú" aria-expanded="false" aria-controls="navMenu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>
  


  <section class="section section--blue" id="mapa">
    <div class="container">
      <div class="heatmap-controls" id="heatmapControls">
        <div class="heatmap-filter-group">
          <label class="heatmap-filter-label">Filtrar por tipo:</label>
          <div class="heatmap-filter-btns" id="filterBtns">
            <button class="heatmap-filter-btn active" data-type="all">Todos</button>
            <button class="heatmap-filter-btn" data-type="hurto">Hurto</button>
            <button class="heatmap-filter-btn" data-type="atraco">Atraco</button>
            <button class="heatmap-filter-btn" data-type="vandalismo">Vandalismo</button>
            <button class="heatmap-filter-btn" data-type="accidente">Accidente</button>
            <button class="heatmap-filter-btn" data-type="otro">Otro</button>
          </div>
        </div>
        <div class="heatmap-stats" id="heatmapStats"><span class="heatmap-stat-badge" id="totalCount">0 reportes</span></div>
      </div>

      <div class="heatmap-wrapper">
        <div id="chiaheatmap" style="width:100%;height:520px;border-radius:14px;z-index:1;"></div>
      </div>

      <div class="incidents-panel" id="incidentsPanel">
        <h3 class="incidents-panel__title">Incidentes Reportados</h3>
        <div id="incidentsList" class="incidents-list"><p class="incidents-empty" id="incidentsEmpty">Aún no hay incidentes reportados. ¡Sé el primero en reportar!</p></div>
      </div>
    </div>
  </section>
  

  <footer class="footer"><div class="footer__container"><div class="footer__brand">Chía Segura</div><div class="footer__center">Facultad de Ingeniería – Universidad de Cundinamarca</div><div class="footer__copy">© 2026 Todos los derechos reservados</div></div></footer>

  <div class="toast" id="toast"></div>

  <div class="modal-backdrop" id="modalBackdrop"> <!-- modal contenido reutilizable -->
    <!-- modal copiado de index.html para consistencia -->
  </div>
  

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
  <script src="config/firebase.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script src="config/emailjs.js"></script>

  <script src="./js/toast.js"></script>
  <script src="./js/navbar.js"></script>
  <script src="./js/modal.js"></script>
  <script src="./js/heatmap.js"></script>
  <script src="./js/reportes.js"></script>
</body>
</html>
